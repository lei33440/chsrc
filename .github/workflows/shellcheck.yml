name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./
          additional_files: install.sh

      - name: Run bash -n
        run: |
          set -e
          for f in chsrc install.sh; do
            echo "checking $f"
            bash -n "$f"
          done
